name: Vectors Conformance

on:
  push:
  pull_request:

jobs:
  vectors-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check vector manifests exist and are valid JSON
        shell: bash
        run: |
          set -euo pipefail
          for f in vectors/RELEASES.json vectors/manifests/tim.json vectors/manifests/discovery.json vectors/manifests/attestations.json vectors/manifests/kernel.json vectors/manifests/notary.json vectors/manifests/settlers.json vectors/manifests/canonicalization.json vectors/manifests/integration.json; do
            if [[ ! -f "$f" ]]; then
              echo "[FAIL] Missing $f" >&2
              exit 1
            fi
          done
          python3 - <<'PY'
          import json
          for p in [
            'vectors/RELEASES.json',
            'vectors/manifests/tim.json',
            'vectors/manifests/discovery.json',
            'vectors/manifests/attestations.json',
            'vectors/manifests/kernel.json',
            'vectors/manifests/notary.json',
            'vectors/manifests/settlers.json',
            'vectors/manifests/canonicalization.json',
            'vectors/manifests/integration.json',
          ]:
            with open(p, 'rb') as f:
              json.load(f)
          print('Vector manifests parsed successfully.')
          PY

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install tooling deps
        run: bun install --frozen-lockfile

      - name: Verify CIDs, signatures, and algorithmic vectors (conformance)
        run: bun run scripts/verify-artifacts.ts

      - name: Install @arky/core deps
        run: bun install --cwd packages/core --frozen-lockfile

      - name: "@arky/core conformance (independent stack vs vectors)"
        run: bun test
        working-directory: packages/core

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: "arky-core (Rust) conformance (second independent stack)"
        run: cargo test --locked
        working-directory: packages/core-rs

      - name: Cross-language agreement (TS == Rust canonical bytes + kernel decisions)
        run: bash scripts/cross-check.sh
