name: Vectors Smoke

on:
  push:
  pull_request:

jobs:
  vectors-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check vector manifests exist and are valid JSON
        shell: bash
        run: |
          set -euo pipefail
          for f in vectors/RELEASES.json vectors/manifests/tim.json vectors/manifests/discovery.json vectors/manifests/attestations.json; do
            if [[ ! -f "$f" ]]; then
              echo "[FAIL] Missing $f" >&2
              exit 1
            fi
          done
          python3 - <<'PY'
          import json, sys
          for p in [
            'vectors/RELEASES.json',
            'vectors/manifests/tim.json',
            'vectors/manifests/discovery.json',
            'vectors/manifests/attestations.json',
          ]:
            with open(p, 'rb') as f:
              json.load(f)
          print('Vector manifests parsed successfully.')
          PY
